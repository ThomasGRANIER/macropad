<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline';">

    <meta
      http-equiv="X-Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <link rel="stylesheet" href="styles.css">
    <title>SimplePAD</title>
  </head>
  <body>
    <div id="ProfilSelector">
      <select name="Profils" id="Profils">
        <option value="1">Profile 1</option>
      </select>
      <button id="AddProfil">+</button>
      <button id="SupprProfil">-</button>
    </div>
    <div id="MacroPad">
      <div id="Encodeurs">
        <div id="E1" class="Encodeur">
          <button id="E1-">E1-</button>
          <button id="E1B">E1B</button>
          <button id="E1+">E1+</button>
        </div>
        <div id="E2" class="Encodeur">
          <button id="E2-">E2-</button>
          <button id="E2B">E2B</button>
          <button id="E2+">E2+</button>
        </div>
      </div>
      <div id="Boutons">
      </div>
    </div>
  </body>
  <script>
    const container_buttons = document.getElementById('Boutons');

    for (let i = 1; i <= 5; i++) {
      // Créer un conteneur pour la ligne
      const container_buttons_L = document.createElement('div');
      container_buttons_L.id = `L${i}`;
      container_buttons.appendChild(container_buttons_L);

      // Créer les boutons de la ligne
      for (let y = 1; y <= 4; y++) {
        const btn = document.createElement('button');
        btn.textContent = `L${i}C${y}`;
        btn.id = `L${i}C${y}`;

        container_buttons_L.appendChild(btn);
      }
    }

    const { ipcRenderer } = require('electron');

    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        ipcRenderer.send('open-settings', btn.id);
      });
    });
  </script>
</html>
