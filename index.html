<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline';">
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <link rel="stylesheet" href="styles.css">
    <title>SimplePAD - Home</title>
  </head>
  <body>
    <div id="ProfilSelector">
      <select name="Profils" id="Profils">
        <option value="1">Profile 1</option>
      </select>
      <button id="AddProfil">+</button>
      <button id="SupprProfil">-</button>
    </div>

    <div id="MacroPad">
      <div id="Encodeurs">
        <div class="Encodeur">
          <button id="E1-" class="encodeurBtn">
            <span class="title">E1-</span>
            <span class="desc">Description</span>
          </button>
          <button id="E1B" class="encodeurBtn">
            <span class="title">E1B</span>
            <span class="desc">Description</span>
          </button>
          <button id="E1+" class="encodeurBtn">
            <span class="title">E1+</span>
            <span class="desc">Description</span>
          </button>
        </div>
        <div class="Encodeur">
          <button id="E2-" class="encodeurBtn">
            <span class="title">E2-</span>
            <span class="desc">Description</span>
          </button>
          <button id="E2B" class="encodeurBtn">
            <span class="title">E2B</span>
            <span class="desc">Description</span>
          </button>
          <button id="E2+" class="encodeurBtn">
            <span class="title">E2+</span>
            <span class="desc">Description</span>
          </button>
        </div>
      </div>

      <div id="Boutons">
        <div class="Ligne">
          <button id="L1C1" class="macroBtn"><span class="title">L1C1</span><span class="desc">Connexion avec l'utilisateur Admin</span></button>
          <button id="L1C2" class="macroBtn"><span class="title">L1C2</span><span class="desc"></span></button>
          <button id="L1C3" class="macroBtn"><span class="title">L1C3</span><span class="desc"></span></button>
          <button id="L1C4" class="macroBtn"><span class="title">L1C4</span><span class="desc"></span></button>
        </div>
        <div class="Ligne">
          <button id="L2C1" class="macroBtn"><span class="title">L2C1</span><span class="desc"></span></button>
          <button id="L2C2" class="macroBtn"><span class="title">L2C2</span><span class="desc"></span></button>
          <button id="L2C3" class="macroBtn"><span class="title">L2C3</span><span class="desc"></span></button>
          <button id="L2C4" class="macroBtn"><span class="title">L2C4</span><span class="desc"></span></button>
        </div>
        <div class="Ligne">
          <button id="L3C1" class="macroBtn"><span class="title">L3C1</span><span class="desc"></span></button>
          <button id="L3C2" class="macroBtn"><span class="title">L3C2</span><span class="desc"></span></button>
          <button id="L3C3" class="macroBtn"><span class="title">L3C3</span><span class="desc"></span></button>
          <button id="L3C4" class="macroBtn"><span class="title">L3C4</span><span class="desc"></span></button>
        </div>
        <div class="Ligne">
          <button id="L4C1" class="macroBtn"><span class="title">L4C1</span><span class="desc"></span></button>
          <button id="L4C2" class="macroBtn"><span class="title">L4C2</span><span class="desc"></span></button>
          <button id="L4C3" class="macroBtn"><span class="title">L4C3</span><span class="desc"></span></button>
          <button id="L4C4" class="macroBtn"><span class="title">L4C4</span><span class="desc"></span></button>
        </div>
        <div class="Ligne">
          <button id="L5C1" class="macroBtn"><span class="title">L5C1</span><span class="desc"></span></button>
          <button id="L5C2" class="macroBtn"><span class="title">L5C2</span><span class="desc"></span></button>
          <button id="L5C3" class="macroBtn"><span class="title">L5C3</span><span class="desc"></span></button>
          <button id="L5C4" class="macroBtn"><span class="title">L5C4</span><span class="desc"></span></button>
        </div>
      </div>
    </div>

    <script>
      const { ipcRenderer } = require('electron');
      const fs = require('fs');
      const path = require('path');
      const yaml = require('js-yaml');

      window.addEventListener('DOMContentLoaded', () => {
        const boutons = document.querySelectorAll('#Boutons button, #Encodeurs button');

        boutons.forEach(button => {
          button.addEventListener('click', () => {
            ipcRenderer.send('EditPage', button.id);
          });
        });
      });

      const scriptsFolder = path.join(__dirname, 'scripts/1');

      window.addEventListener('DOMContentLoaded', () => {
        const boutons = document.querySelectorAll('.macroBtn, .encodeurBtn');

        boutons.forEach(btn => {
          const btnId = btn.id.toLowerCase(); // ex: L1C1 ou E1B
          const yamlFile = path.join(scriptsFolder, `${btnId}.yml`);

          let name = 'non définie';

          if (fs.existsSync(yamlFile)) {
            try {
              const fileContents = fs.readFileSync(yamlFile, 'utf8');
              const data = yaml.load(fileContents);

              if (data && data.name && data.name.trim() !== '') {
                name = data.name;
              }
            } catch (err) {
              console.error(`Erreur lecture YAML pour ${btnId}:`, err);
            }
          }

          const desc = btn.querySelector('.desc');
          if (desc) desc.textContent = name;
        });
      });
    </script>
  </body>
</html>
