<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>SimplePAD - Edit macro</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="TopLine">
    <h1 id="titre">Chargement...</h1>
    <div id="Buttons">
      <p id="state" title="Etat">🟢</p>
      <button id="save" title="Sauvegarder">💾</button>
      <button id="retour" title="Quitter">✖️</button>
    </div>
  </div>
  <div id="Editor"></div>

  <script>
    const { ipcRenderer } = require('electron');
    const fs = require('fs');
    const path = require('path');

    // CodeMirror 6 imports
    const { EditorState } = require('@codemirror/state');
    const { EditorView, keymap, lineNumbers, highlightActiveLine } = require('@codemirror/view');
    const { defaultKeymap, indentMore, indentLess } = require('@codemirror/commands');
    const { yaml } = require('@codemirror/lang-yaml');
    const { oneDark } = require('@codemirror/theme-one-dark');
    const { autocompletion, completeFromList } = require('@codemirror/autocomplete'); // <-- Ajout


    // On stocke le contenu original
    let originalContent = "";
    let state = true; // true = non editer & false = edition en cours

    // Récupération du paramètre dans l’URL
    const params = new URLSearchParams(window.location.search);
    const btnId = params.get('btnId');

    document.getElementById('titre').innerHTML = `Configuration du bouton <i>${btnId}</i>`;

    // Lecture du fichier YAML correspondant
    const filePath = path.join(__dirname, `../scripts/1/${btnId.toLowerCase()}.yml`);
    let editor;
    // 🔹 Fonction pour charger les complétions depuis le JSON
    function loadCompletions() {
      const jsonPath = path.join(__dirname, "autocomplete.json");
      try {
        const data = fs.readFileSync(jsonPath, "utf8");
        const items = JSON.parse(data);
        return items.map(item => ({
          label: item.label,
          type: "keyword",
          info: item.info,
          apply(view, completion, from, to) {
            const line = view.state.doc.lineAt(from);
            const indentMatch = line.text.match(/^(\s*)/); // récupère les espaces/tabs au début de la ligne
            const currentIndent = indentMatch ? indentMatch[1] : "";

            // On adapte le snippet pour qu'il suive l'indentation actuelle
            const snippet = item.snippet.replace(/\n/g, "\n" + currentIndent + "  "); // +2 espaces pour la suite YAML

            view.dispatch({
              changes: { from, to, insert: snippet }
            });
          }
        }));
      } catch (err) {
        console.error("Erreur chargement autocomplete.json :", err);
        return [];
      }
    }

    const completions = loadCompletions();

    function myCompletions(context) {
      const word = context.matchBefore(/\w*/);
      if (!word || (word.from === word.to && !context.explicit)) return null;
      return {
        from: word.from,
        options: completions
      };
    }

    fs.readFile(filePath, 'utf-8', (err, data) => {
      const content = err ? "# Erreur de lecture du fichier" : data;
      const editorState = EditorState.create({
        doc: content,
        extensions: [
          yaml(),
          lineNumbers(),
          highlightActiveLine(),
          keymap.of([
            ...defaultKeymap,
            { key: "Tab", preventDefault: true, run: indentMore },
            { key: "Shift-Tab", preventDefault: true, run: indentLess },
          ]),
          oneDark,
          EditorView.lineWrapping,
          autocompletion({ override: [myCompletions] }),
          EditorView.theme({
            "&": {height: "100%"}
          }),
          EditorView.updateListener.of(update => {
            if (update.docChanged) {
              const currentContent = update.state.doc.toString();
              state = (currentContent === originalContent);
              document.getElementById('state').textContent = state ? "🟢" : "🔴";
            }
          })
        ]
      });

      editorView = new EditorView({
        state: editorState,
        parent: document.getElementById('Editor')
      });

      originalContent = editorState.doc.toString();
    });

    function saveChanges() {
      const content = editorView.state.doc.toString();
      return new Promise((resolve, reject) => {
        fs.writeFile(filePath, content, err => {
          if (err) {
            console.error("Erreur sauvegarde :", err);
            reject(err);
          } else {
            resolve();
          }
        });
      });
    }

    // Sauvegarde du contenu
    document.getElementById('save').addEventListener('click', () => {
      saveChanges()
    });


    // Retour à l’accueil
    document.getElementById('retour').addEventListener('click', async () => {
      if (!state) {
        const result = await ipcRenderer.invoke('show-exit-dialog');

        if (result === 0) {
          // Annuler
          return;
        } else if (result === 1) {
          // Quitter sans sauvegarder
          ipcRenderer.send('go-back');
        } else if (result === 2) {
          // Sauvegarder et quitter
          try {
            await saveChanges(); // <- on attend la fin de la sauvegarde
            ipcRenderer.send('go-back');
          } catch (err) {
            alert("Erreur lors de la sauvegarde, impossible de quitter !");
          }
        }
      } else {
        ipcRenderer.send('go-back');
      }
    });
  </script>
</body>

</html>
